<!DOCTYPE html>
<html lang="ro" data-theme="startlamiscare">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>{{ post.title }} — Start la Mișcare</title>
</head>

<body class="min-h-screen bg-base-100 text-base-content">
  <div class="navbar bg-base-100/80 backdrop-blur border-b border-base-300 sticky top-0 z-50">
    <div class="navbar-start">
      <a href="{{ url_for('index') }}" class="btn btn-ghost">← Înapoi</a>
    </div>
    <div class="navbar-center">
      <div class="font-black">Start la Mișcare</div>
    </div>
    <div class="navbar-end">
      <a href="{{ url_for('anunturi') }}" class="btn btn-outline btn-sm">Toate știrile</a>
    </div>
  </div>

  <main class="max-w-4xl mx-auto px-6 py-10">
    <div class="card bg-base-200 border border-base-300">
      <div class="card-body">
        <h1 class="text-3xl lg:text-4xl font-black">{{ post.title }}</h1>
        <p class="mt-4 opacity-90 whitespace-pre-line">{{ post.description }}</p>

        {% if post.uploads %}
          {% set files = post.uploads.split(',') %}
          <div class="mt-8">
            <h2 class="text-xl font-black mb-3">Fișiere</h2>
            <div class="grid sm:grid-cols-2 gap-3">
              {% for f in files %}
                <a class="btn btn-outline justify-start"
                   href="{{ url_for('static', filename='uploads/' ~ f) }}"
                   target="_blank" rel="noopener">
                  📎 {{ f }}
                </a>
              {% endfor %}
            </div>
          </div>
        {% endif %}
      </div>
    </div>
  </main>

  <footer class="text-center py-6 border-t border-base-300 opacity-70">
    © 2026 Start la Mișcare
  </footer>
</body>
</html>
